name: ✅ Structural Router Full Validation (PR-C7.1b)

# Full-scale validation of structural_router.py against ALL X-Ray
# Section-9 flagged rows. Measures the false-positive collapse (rows →
# admin) vs genuine residue (rows → meeting), re-confirms zero
# status-grouping drift vs LIS's live published list, and writes results
# to C7_1b_FV_* tabs (read numbers from the SHEET, not the terminal).
# Checkpointed every 25 bills (C7_1b_FV_BillEvents) — resumable.
# See tools/c7_1b_eventcode_namespace/full_validate.py.

on:
  workflow_dispatch: {}

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install gspread google-auth requests
      - name: Run Full Validation
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
          PYTHONUNBUFFERED: "1"
        run: python -u tools/c7_1b_eventcode_namespace/full_validate.py
