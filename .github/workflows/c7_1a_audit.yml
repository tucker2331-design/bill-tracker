name: 🧮 Derived Classifier Math Audit (PR-C7.1a)

# Read-only viability audit for the derived classifier proposed in
# PR-C7.1. Owner mandate (2026-05-11): mathematical proof of safety
# before the architecture is implemented.
#
# Cost: ~200 LIS API calls (well under any rate limit), ~5 min wall
# clock. Persists incremental progress to Sheet1 tab `C7_1a_RawCorpus`
# every 10 bills so a mid-process interruption (rate limit, timeout,
# rerun) loses at most one batch.
#
# See tools/c7_1a_audit/audit.py for the full method + math.
#
# Manual trigger only. Outputs land in:
#   - Sheet1!C7_1a_RawCorpus    (fetched event corpus, checkpointable)
#   - Sheet1!C7_1a_TokenStats   (per-token signal table)
#   - Sheet1!C7_1a_DLQ_Samples  (50 examples for human inspection)
#   - Sheet1!C7_1a_Summary      (headline numbers + sweep grid)

on:
  workflow_dispatch: {}

jobs:
  audit:
    runs-on: ubuntu-latest
    # 30 min is generous; the audit normally finishes in <5 min. A
    # higher ceiling allows partial-progress resumption: even if a
    # single run goes long, checkpointing means re-running picks up
    # where we left off.
    timeout-minutes: 30
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install gspread google-auth pandas requests

      - name: Run PR-C7.1a Audit
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: python tools/c7_1a_audit/audit.py
