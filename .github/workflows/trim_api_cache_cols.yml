name: ✂️ Trim API_Cache Columns (Mastermind DB)

# One-shot maintenance: trims API_Cache from 26 cols to 6 to reclaim
# the workbook's 10M cell quota. See tools/cell_count_audit/trim_api_cache_cols.py
# for full context (dual safety checks, dry-run pattern).
#
# Manual trigger only. The destructive resize is gated behind:
#   1. The script's two in-code safety checks (schema match + all-empty
#      verification across cols 7..col_count).
#   2. The dry_run toggle below, default true. The user must explicitly
#      flip dry_run to false to permit the live resize.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run only (verify safety checks, do NOT resize)"
        type: boolean
        default: true

jobs:
  trim:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install gspread google-auth

      - name: Run Trim Script
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: python tools/cell_count_audit/trim_api_cache_cols.py
