name: 📐 LegEvent Sizing Audit (PR-C6.4)

# Read-only sizing audit for PR-C7's structural pivot. See
# tools/legevent_sizing/sizing_audit.py for full context (PR-C3 hang
# lesson, expected fetch counts, phased-rollout recommendation).
#
# Manual trigger only. Output is read from the workflow log to scope
# PR-C7's cache hydration strategy.

on:
  workflow_dispatch: {}

jobs:
  sizing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install gspread google-auth pandas

      - name: Run Sizing Audit
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: python tools/legevent_sizing/sizing_audit.py
