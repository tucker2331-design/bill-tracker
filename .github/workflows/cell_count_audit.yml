name: 🔍 Cell Count Audit (Mastermind DB)

# One-shot read-only audit of the Mastermind DB workbook's cell consumption,
# in support of the post-PR-C6 storage-cap diagnosis. See
# tools/cell_count_audit/audit.py for context.
#
# Manual trigger only — there is no scheduled run. Runs against the live
# workbook with the same GCP_CREDENTIALS the calendar worker uses, but
# under spreadsheets.readonly scope inside the script.

on:
  workflow_dispatch: {}

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install gspread google-auth

      - name: Run Cell Count Audit
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: python tools/cell_count_audit/audit.py
