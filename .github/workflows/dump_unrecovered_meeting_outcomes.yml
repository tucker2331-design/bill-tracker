name: 🩺 Dump Unrecovered Meeting Outcomes (PR-C6.3 triage)

# One-shot read-only triage for the 994 meeting bugs surfaced by the
# PR-C6 full-session stress test. See
# tools/meeting_bug_triage/dump_unrecovered_meeting_outcomes.py for context.
#
# Manual trigger only. The script's output (top outcomes + verb-coverage
# analysis + suggested additions) is read from the workflow log to
# scope the actual fix in PR-C6.3.

on:
  workflow_dispatch: {}

jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install gspread google-auth

      - name: Run Verb Dump
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: python tools/meeting_bug_triage/dump_unrecovered_meeting_outcomes.py
