name: 🤖 Mastermind Ghost Worker 2

on:
  schedule:
    - cron: '*/15 * * * *' # Runs every 15 minutes
  workflow_dispatch: # Adds a manual "Run Now" button in GitHub

# PR-C1: queue overlapping cycles rather than parallelizing them. If a cycle
# N is still running when cycle N+1 fires (e.g. GitHub Actions is slow and
# the 15-min run took 18 min), N+1 waits for N to finish. `cancel-in-progress:
# false` means we NEVER cancel a mid-flight cycle — losing work mid-cycle
# would leave Sheet1 in a half-written state, which is worse than queuing.
# The 15-min cron is tight enough that queued cycles still complete within
# a reasonable window; a truly stuck cycle would need separate alerting
# (GitHub Actions surfaces runtime > threshold natively).
concurrency:
  group: calendar-worker
  cancel-in-progress: false

jobs:
  update-database:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests gspread google-auth pandas beautifulsoup4 pdfplumber playwright

      # PR-C2.1: Playwright Chromium is required by `lis_historical_scraper.py`
      # for blind-window-loss recovery. Cache the browser binary across runs
      # so we don't re-download ~150MB of Chromium on every 15-min cycle.
      # Cache key bumps when the playwright pip pin changes (track
      # explicitly when we add a version pin to requirements.txt).
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v3
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-v1

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: python -m playwright install chromium --with-deps

      - name: Run Backend Worker
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: python calendar_worker.py
